<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Security Review Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>AI Security Review Platform</h1>
        <p class="subtitle">Scan any GitHub repository for security vulnerabilities using AI</p>

        <div class="form-group">
            <label for="owner">GitHub Username / Organization</label>
            <input type="text" id="owner" placeholder="e.g. vanshsethi217">
        </div>

        <div class="form-group">
            <label for="repo">Repository Name</label>
            <input type="text" id="repo" placeholder="e.g. ai-review-reports">
        </div>

        <div class="form-group">
            <label for="prompt">Custom Review Focus (optional)</label>
            <textarea id="prompt" rows="3" placeholder="e.g. Focus only on SQL injection and authentication issues"></textarea>
            <div class="preset-buttons">
                <button type="button" class="preset-btn" onclick="setPreset('SQL injection and database security')">SQL Injection</button>
                <button type="button" class="preset-btn" onclick="setPreset('OWASP Top 10 vulnerabilities')">OWASP Top 10</button>
                <button type="button" class="preset-btn" onclick="setPreset('performance and code efficiency')">Performance</button>
                <button type="button" class="preset-btn" onclick="setPreset('')">Clear</button>
            </div>
        </div>

        <button id="scanButton" onclick="runScan()">Run Scan Now</button>

        <div id="status"></div>

        <div id="resultBox" class="result-box hidden">
            <h3>Scan Complete</h3>
            <p id="resultSummary"></p>
            <a id="reportLink" href="#" target="_blank" class="report-link">Open Report</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
