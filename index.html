<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Security Review Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>AI Security Review Platform</h1>
        <p class="subtitle">Scan any of your GitHub repositories for security vulnerabilities using AI</p>

        <div class="form-group">
            <label for="repo">Repository</label>
            <select id="repo">
                <option value="">Loading repositories...</option>
            </select>
        </div>

        <div class="form-group">
            <label for="prompt">Custom Review Focus (optional)</label>
            <textarea id="prompt" rows="3" placeholder="e.g. Focus only on SQL injection and authentication issues"></textarea>
            <div class="preset-label">Suggested prompts (click to use):</div>
            <div class="preset-buttons">
                <button type="button" class="preset-btn" onclick="setPreset('SQL injection and database security')">SQL Injection</button>
                <button type="button" class="preset-btn" onclick="setPreset('OWASP Top 10 vulnerabilities')">OWASP Top 10</button>
                <button type="button" class="preset-btn" onclick="setPreset('performance and code efficiency')">Performance</button>
                <button type="button" class="preset-btn" onclick="setPreset('Find hardcoded credentials, API keys, passwords, tokens, and secrets in the code')">Hardcoded Secrets</button>
                <button type="button" class="preset-btn" onclick="setPreset('')">Clear</button>
            </div>
            <div class="saved-prompts-row">
                <button type="button" class="save-prompt-btn" onclick="saveCurrentPrompt()">+ Save current prompt</button>
            </div>
            <div id="savedPromptsList" class="saved-prompts-list"></div>
        </div>

        <button id="scanButton" onclick="runScan()">Run Scan Now</button>

        <div id="status"></div>
        <div id="progressList" class="progress-list"></div>

        <div id="resultBox" class="result-box hidden">
            <h3>Scan Complete</h3>
            <p id="resultSummary"></p>
            <a id="reportLink" href="#" target="_blank" class="report-link">Open Report</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
